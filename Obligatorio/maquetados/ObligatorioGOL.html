<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Ofertas Laborales</title>
</head>

<body>

    <h1>Gestión de Ofertas Laborales</h1>

    <h2>Nueva Oferta</h2>

    <form>
        <label>Título de la oferta:</label><br>
        <input type="text" name="titulo" required><br><br>

        <label>Nombre de la empresa:</label><br>
        <input type="text" name="empresa" required><br><br>

        <label>Descripción:</label><br>
        <textarea name="descripcion" rows="5" cols="50"></textarea><br><br>

        <label>Nivel requerido:</label><br>
        <select name="nivel">
            <option>Seleccionar</option>
            <option>Junior</option>
            <option>Semi-Senior</option>
            <option>Senior</option>
        </select><br><br>

        <label>Área:</label><br>
        <select name="area">
            <option>Seleccionar</option>
            <option>Tecnología</option>
            <option>Diseño</option>
            <option>Marketing</option>
            <option>Administración</option>
            <option>Otros</option>
        </select><br><br>

        <label>Cantidad de vacantes:</label><br>
        <input type="number" name="vacantes" min="1"><br><br>

        <label>Límite de postulaciones:</label><br>
        <input type="number" name="limitePostulaciones" min="1"><br><br>

        <label>
            <input type="checkbox" name="destacada">
            Oferta destacada
        </label><br><br>

        <button type="submit">Guardar Oferta</button>
    </form>

    <hr>

    <h2>Listado de Ofertas</h2>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Empresa</th>
                <th>Nivel</th>
                <th>Área</th>
                <th>Vacantes</th>
                <th>Estado</th>
                <th>Destacada</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>JOB_OFFER_001</td>
                <td>Desarrollador Backend</td>
                <td>Tech Solutions</td>
                <td>Junior</td>
                <td>Tecnología</td>
                <td>3</td>
                <td>Activa</td>
                <td>Sí</td>
                <td>
                    <button>Editar</button>
                    <button>Cerrar</button>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
